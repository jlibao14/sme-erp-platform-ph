version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sme_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sme_erp
      POSTGRES_PASSWORD: sme_erp_password
      POSTGRES_DB: sme_erp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sme_erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
